name: 🚀 SEVER AI STV PREMIUM

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session duration'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      # WELCOME BANNER
      - name: 🎯 SYSTEM STARTUP
        run: |
          Write-Host ""
          Write-Host ""
          Write-Host "🤖 AI STV PREMIUM RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Duration: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host ""
          
          # Loading animation
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
              Write-Host "`r🚀 Initializing system... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ System ready!                    " -ForegroundColor Green

      # ADVANCED CONFIGURATION
      - name: 🔧 SYSTEM CONFIGURATION
        run: |
          Write-Host ""
          Write-Host "🛠️  CONFIGURING SYSTEM" -ForegroundColor Yellow
          
          $steps = @(
              @{Name="Enable Remote Desktop"; Script={ 
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
              }},
              @{Name="Disable Network Level Authentication"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
              }},
              @{Name="Configure RDP Security"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
              }},
              @{Name="Open port 3389 in firewall"; Script={
                  netsh advfirewall firewall add rule name="RDP-Premium" dir=in action=allow protocol=TCP localport=3389 profile=any
                  netsh advfirewall firewall add rule name="RDP-Premium-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
              }},
              @{Name="Start services"; Script={
                  Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
                  Set-Service -Name UmRdpService -StartupType Automatic -ErrorAction SilentlyContinue
                  Start-Service -Name TermService -ErrorAction SilentlyContinue
                  Start-Service -Name UmRdpService -ErrorAction SilentlyContinue
              }}
          )
          
          foreach($step in $steps) {
              Write-Host "│ 📋 $($step.Name)..." -NoNewline -ForegroundColor White
              try {
                  & $step.Script
                  Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green
              } catch {
                  Write-Host "`r│ ⚠️  $($step.Name) - Minor error skipped" -ForegroundColor Yellow
              }
              Start-Sleep -Milliseconds 500
          }
          
          Write-Host "🎯 Configuration complete!" -ForegroundColor Green

      # CREATE PREMIUM USER - (optimized password)
      - name: 👤 CREATE PREMIUM ACCOUNT
        run: |
          Write-Host ""
          Write-Host "👤 CREATING PREMIUM ACCOUNT" -ForegroundColor Yellow
          
          # Function to generate short password (8 chars) with at least 1 uppercase, 1 lowercase, 1 number
          function New-PremiumPassword {
              param()
              $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'   # exclude I,O to avoid confusion
              $lower = 'abcdefghijkmnpqrstuvwxyz'
              $numbers = '23456789'               # exclude 0,1 to avoid confusion
              $all = $upper + $lower + $numbers

              # ensure 1 uppercase, 1 lowercase, 1 number
              $pw = ''
              $pw += $upper[(Get-Random -Minimum 0 -Maximum $upper.Length)]
              $pw += $lower[(Get-Random -Minimum 0 -Maximum $lower.Length)]
              $pw += $numbers[(Get-Random -Minimum 0 -Maximum $numbers.Length)]

              # add random characters to reach 8 chars
              for ($i = 1; $i -le 5; $i++) {
                  $pw += $all[(Get-Random -Minimum 0 -Maximum $all.Length)]
              }

              # shuffle randomly and return
              return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }

          # If user sets custom password (via secret), prioritize it
          if ($env:CUSTOM_RDP_PASS) {
              $password = $env:CUSTOM_RDP_PASS
              Write-Host "│ ℹ️  Using custom password from env" -ForegroundColor Blue
          } else {
              $password = New-PremiumPassword
          }

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Remove old user if exists
          try {
              Remove-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Removed old user" -ForegroundColor Green
          } catch {
              Write-Host "│ ℹ️  No old user to remove" -ForegroundColor Blue
          }
          
          # Create new user with full permissions
          try {
              New-LocalUser -Name "AISTV-PREMIUM" -Password $securePass -AccountNeverExpires -Description "AI STV Premium Account"
              Write-Host "│ ✅ Created new user" -ForegroundColor Green
              
              # Set password to never expire
              try {
                  Set-LocalUser -Name "AISTV-PREMIUM" -PasswordNeverExpires $true -ErrorAction SilentlyContinue
              } catch {
                  # If environment doesn't support Set-LocalUser, safely ignore
              }

              # Add to necessary groups
              Add-LocalGroupMember -Group "Administrators" -Member "AISTV-PREMIUM" -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "AISTV-PREMIUM" -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Users" -Member "AISTV-PREMIUM" -ErrorAction SilentlyContinue
              
              # Enable user
              Enable-LocalUser -Name "AISTV-PREMIUM"
              
              Write-Host "│ ✅ Granted Administrator & RDP permissions" -ForegroundColor Green
              
          } catch {
              Write-Host "│ ❌ Error creating user: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
          }
          
          # Save info (careful if repo is public)
          echo "RDP_USER=AISTV-PREMIUM" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "$password" > $env:TEMP\rdp_password.txt
          
          Write-Host "✅ Account: AISTV-PREMIUM ready" -ForegroundColor Green

      # CHECK LOGIN PERMISSIONS
      - name: 🔍 SYSTEM PERMISSION CHECK
        run: |
          Write-Host ""
          Write-Host "🔍 CHECKING LOGIN PERMISSIONS" -ForegroundColor Yellow
          
          # Check if user exists
          $user = Get-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          if ($user) {
              Write-Host "│ ✅ User AISTV-PREMIUM exists" -ForegroundColor Green
              Write-Host "│ 📊 Status: $($user.Enabled)" -ForegroundColor White
          } else {
              Write-Host "│ ❌ User does not exist" -ForegroundColor Red
              exit 1
          }
          
          # Check Administrator permissions
          $isAdmin = (Get-LocalGroupMember -Group "Administrators" | Where-Object {$_.Name -like "*AISTV-PREMIUM"}).Count -gt 0
          if ($isAdmin) {
              Write-Host "│ ✅ Has Administrator permissions" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ No Administrator permissions" -ForegroundColor Red
          }
          
          # Check Remote Desktop permissions
          $isRDPUser = (Get-LocalGroupMember -Group "Remote Desktop Users" | Where-Object {$_.Name -like "*AISTV-PREMIUM"}).Count -gt 0
          if ($isRDPUser) {
              Write-Host "│ ✅ Has Remote Desktop permissions" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ No Remote Desktop permissions" -ForegroundColor Red
          }
          
          # Check RDP service
          $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($termService.Status -eq 'Running') {
              Write-Host "│ ✅ TermService is running" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ TermService is not running" -ForegroundColor Red
          }
          
          Write-Host "🎯 Check complete!" -ForegroundColor Green

      # TAILSCALE PREMIUM
      - name: 🌐 PREMIUM NETWORK SETUP
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host ""
          Write-Host "🌐 SETTING UP NETWORK CONNECTION" -ForegroundColor Yellow
          
          # Install Tailscale
          try {
              $msiPath = "$env:TEMP\tailscale-premium.msi"
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
              Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
              Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Tailscale installed successfully" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Tailscale installation error" -ForegroundColor Red
          }
          
          # Wait for service to start
          Start-Sleep -Seconds 10
          
          # Connect Tailscale
          try {
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=ai-stv-premium-$env:GITHUB_RUN_ID --accept-routes --accept-dns --reset
              Write-Host "│ ✅ Tailscale connected successfully" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Tailscale connection error" -ForegroundColor Red
          }
          
          # Get IP with retry mechanism
          Write-Host "🔄 Getting IP address..." -NoNewline -ForegroundColor Blue
          $ip = $null
          for($i=0; $i -lt 20; $i++) {
              try {
                  $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  if ($ip -and $ip -match '^\d+\.\d+\.\d+\.\d+$') {
                      echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
                      Write-Host "`r✅ IP Address: $ip" -ForegroundColor Green
                      break
                  }
              } catch {
                  # Ignore error and retry
              }
              Write-Host "`r🔄 Getting IP address... $(@('.', '..', '...')[$i % 3])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Seconds 3
          }
          
          if (-not $ip -or $ip -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              Write-Host "`r⚠️  Cannot get IP, using localhost" -ForegroundColor Yellow
              echo "TAILSCALE_IP=localhost" >> $env:GITHUB_ENV
          }

      # DISPLAY CONNECTION INFO
      - name: 🎉 CONNECTION INFORMATION
        run: |
          $password = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          if (-not $password) {
              $password = "Cannot read password"
          }
          
          # Convert duration from input to minutes
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
              "1h" { $totalMinutes = 60; $displayTime = "1 hour" }
              "3h" { $totalMinutes = 180; $displayTime = "3 hours" }
              "5h40m" { $totalMinutes = 340; $displayTime = "5 hours 40 minutes" }
          }
          
          # Calculate exact times
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "┌───────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│              🎉 CONNECTION SUCCESSFUL!           │" -ForegroundColor Cyan
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 🌐  Address: $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "│ 👤  Username: AISTV-PREMIUM" -ForegroundColor White
          Write-Host "│ 🔐  Password: $password" -ForegroundColor White
          Write-Host "│ ⏰  Duration: $displayTime" -ForegroundColor White
          Write-Host "│ 🕐  Start time: $($startTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 🕐  End time: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 📍  Port: 3389" -ForegroundColor White
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 💡  Instructions:                                │" -ForegroundColor Cyan
          Write-Host "│   1. Open Remote Desktop Connection              │" -ForegroundColor Yellow
          Write-Host "│   2. Enter: $env:TAILSCALE_IP                    │" -ForegroundColor Yellow
          Write-Host "│   3. Username: AISTV-PREMIUM | Password: above   │" -ForegroundColor Yellow
          Write-Host "│   4. Enjoy! 🚀                                   │" -ForegroundColor Yellow
          Write-Host "└───────────────────────────────────────────┘" -ForegroundColor Cyan
          
          # Save time to environment variable
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      # MAINTAIN SESSION
      - name: ⏳ MAINTAINING SESSION
        run: |
          $password = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          $totalMinutes = $env:TOTAL_MINUTES
          
          # Calculate exact times
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "🔄 STARTING SESSION MAINTENANCE..." -ForegroundColor Yellow
          Write-Host "💎 Session: AI STV PREMIUM" -ForegroundColor Magenta
          Write-Host "🔗 Connection: $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "🕐 Start time: $($startTime.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host "🕐 End time: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host ""
          
          # Create system monitoring process
          $monitorScript = {
              $lastLogTime = Get-Date
              while ($true) {
                  $currentTime = Get-Date
                  
                  # Log status every 2 minutes
                  if (($currentTime - $lastLogTime).TotalMinutes -ge 2) {
                      # Check services
                      $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                      $rdpConnections = Get-NetTCPConnection -LocalPort 3389 -ErrorAction SilentlyContinue | Where-Object {$_.State -eq 'Established'}
                      
                      Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 📊 Status - RDP: $($termService.Status), Connections: $($rdpConnections.Count)" -ForegroundColor Blue
                      $lastLogTime = $currentTime
                  }
                  
                  # Check and restart service if needed
                  $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                  if ($termService.Status -ne 'Running') {
                      Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 🔄 Restarting TermService..." -ForegroundColor Yellow
                      Start-Service -Name TermService -ErrorAction SilentlyContinue
                  }
                  
                  Start-Sleep -Seconds 30
              }
          }
          
          # Run monitor in background
          Start-Job -ScriptBlock $monitorScript -Name "SystemMonitor"
          
          # Display main timer
          $frames = @('⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏')
          $colors = @('Red', 'Yellow', 'Green', 'Cyan', 'Blue', 'Magenta')
          $sessionStart = Get-Date
          
          do {
              $currentTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
              $timeRemaining = $endTime - $currentTime
              
              $hoursRemaining = [math]::Max(0, [math]::Floor($timeRemaining.TotalHours))
              $minutesRemaining = [math]::Max(0, [math]::Floor($timeRemaining.TotalMinutes % 60))
              $secondsRemaining = [math]::Max(0, [math]::Floor($timeRemaining.TotalSeconds % 60))
              
              $frame = $frames[([int]((Get-Date) - $sessionStart).TotalSeconds) % $frames.Length]
              $color = $colors[([int]((Get-Date) - $sessionStart).TotalMinutes) % $colors.Length]
              
              Write-Host "`r$frame [$($currentTime.ToString('HH:mm:ss'))] Time remaining: $hoursRemaining hours $minutesRemaining minutes $secondsRemaining seconds" -NoNewline -ForegroundColor $color
              
              Start-Sleep -Seconds 5
              
          } while ($timeRemaining.TotalSeconds -gt 0)
          
          Write-Host ""
          Write-Host "🎯 TIME EXPIRED - AUTOMATIC SHUTDOWN!" -ForegroundColor Red
          
          # Clean up jobs
          Get-Job -Name "SystemMonitor" -ErrorAction SilentlyContinue | Stop-Job -PassThru | Remove-Job -Force

      # PROFESSIONAL CLEANUP
      - name: 🧹 SYSTEM CLEANUP
        if: always()
        run: |
          Write-Host ""
          Write-Host "🧹 CLEANING UP SYSTEM..." -ForegroundColor Yellow
          
          $cleanupSteps = @(
              @{Name="Delete password file"; Script={
                  Remove-Item "$env:TEMP\rdp_password.txt" -ErrorAction SilentlyContinue
              }},
              @{Name="Disable user account"; Script={
                  Disable-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
              }},
              @{Name="Close network connections"; Script={
                  & "$env:ProgramFiles\Tailscale\tailscale.exe" down --accept-risk=all -ErrorAction SilentlyContinue
                  Start-Sleep -Seconds 5
              }},
              @{Name="Remove firewall rules"; Script={
                  netsh advfirewall firewall delete rule name="RDP-Premium" dir=in -ErrorAction SilentlyContinue
                  netsh advfirewall firewall delete rule name="RDP-Premium-Out" dir=out -ErrorAction SilentlyContinue
                  Remove-NetFirewallRule -DisplayName "RDP-Premium" -ErrorAction SilentlyContinue
                  Remove-NetFirewallRule -DisplayName "RDP-Premium-Out" -ErrorAction SilentlyContinue
              }},
              @{Name="Restore RDP settings"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force -ErrorAction SilentlyContinue
                  Stop-Service -Name TermService -Force -ErrorAction SilentlyContinue
              }}
          )
          
          foreach($step in $cleanupSteps) {
              Write-Host "│ 🗑️  $($step.Name)..." -NoNewline -ForegroundColor Gray
              try {
                  & $step.Script
                  Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green
              } catch {
                  Write-Host "`r│ ⚠️  $($step.Name) - Safely handled" -ForegroundColor Yellow
              }
              Start-Sleep -Milliseconds 300
          }
          
          # Clean up remaining jobs
          Get-Job | Stop-Job -PassThru | Remove-Job -Force -ErrorAction SilentlyContinue
          
          Write-Host ""
          Write-Host "🎉 Cleanup complete! Goodbye! 👋" -ForegroundColor Green
